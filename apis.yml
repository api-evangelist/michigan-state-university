aid: michigan-state-university
name: Michigan State University
description: >-
  Michigan State University (MSU) is a public land-grant research university in East Lansing,
  Michigan, United States, ranked #89 in the QS World University Rankings 2025. Like most
  large research institutions, MSU does not operate a single consolidated public developer
  portal; its confirmed public API footprint is concentrated in the MSU Libraries platforms,
  which expose a VuFind REST API (OpenAPI 3.0) for the library catalog and OAI-PMH 2.0
  endpoints for the catalog and the digital repository. Identity is provided through a
  Shibboleth/SAML Identity Provider with OAuth 2.0 support, and MSU maintains official GitHub
  organizations for the university and for MSU Libraries. Most administrative, student, and
  research-profile interfaces are gated behind institutional affiliation rather than offered
  as open self-service APIs.
