  - date: '2026-06-03'
    rating: 3
    summary: >-
      MSU has no single consolidated public developer portal, but several real public
      machine interfaces were verified live: the MSU Libraries VuFind catalog REST API
      (OpenAPI 3.0.3, VuFind v11.0.4) returned a valid OpenAPI document, and OAI-PMH 2.0
      Identify responses were confirmed for both the catalog repository and the MSU
      Libraries Digital Repository. MSU's Shibboleth/SAML Identity Provider responds and the
      university documents OAuth 2.0 support, but it is gated to registered institutional
      integrations. The d.lib /api path requires authentication (401) and no IIIF root was
      found (404). No data.msu.edu open-data API, no api.msu.edu/developer.msu.edu host, and
      no public status page resolved. No endpoints were fabricated; every URL below was
      probed directly.
    endpoints:
      - url: https://catalog.lib.msu.edu/api/v1
        status: 200
        note: VuFind REST API Swagger UI; OpenAPI 3.0.3 spec served at /api/v1/?swagger.
