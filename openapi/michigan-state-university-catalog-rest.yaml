openapi: 3.0.3
info:
  title: Library Catalog
  version: 11.0.4
  description: The REST API provides access to search functions and records contained in the search index.
servers:
- url: https://catalog.lib.msu.edu/api/v1
components:
  schemas:
    Success:
      type: object
      properties:
        status:
          description: Status code
          type: string
          enum:
          - OK
        statusMessage:
          description: A descriptive error message
          type: string
      required:
      - status
    Error:
      type: object
      properties:
        status:
          description: Status code
          type: string
          enum:
          - ERROR
        statusMessage:
          description: A descriptive error message
          type: string
      required:
      - status
      - statusMessage
    Unauthorized:
      type: object
      properties:
        status:
          description: Status code
          type: string
          enum:
          - UNAUTHORIZED
        statusMessage:
          description: A descriptive error message
          type: string
      required:
