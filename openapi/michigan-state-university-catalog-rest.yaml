paths:
  /record:
    get:
      summary: Fetch records from primary index
      description: Return a single record or multiple records from primary index. POST method may also be used if sending
        a long request.
      parameters:
      - name: id
        in: query
        description: A single record ID
        required: false
        schema:
          type: string
      - name: id[]
        in: query
        description: Multiple record IDs
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: field[]
        in: query
        description: 'Fields to return. If not specified, a set of default fields is returned.


          The default fields are:

          - authors

          - formats

          - id

          - uuid

          - languages

          - series

          - subjects

          - title

          - urls'
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: prettyPrint
        in: query
        description: Whether to pretty-print the response. Useful for observing the results in a browser.
        schema:
          type: boolean
          default: false
      - name: lng
        in: query
        description: Language for returned translated strings.
        schema:
          type: string
          enum:
          - en
          default: en
      - name: callback
        in: query
        description: A callback that can be used for JSONP.
        schema:
          type: string
      tags:
      - Record
      responses:
        '200':
          description: Response containing result count and records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /search:
    get:
      summary: Search primary index
      description: 'Search primary index with given terms and filters. POST method may also be used if sending a long request.


        The URL syntax here is the same as the one used in VuFind® user interface. It is possible to make a search in VuFind®
        and copy the query parameters here to make the same search via the API. While this formal specification only describes
        basic searching, advanced searches like join=AND&lookfor0[]=apples&type0[]=Title&lookfor0[]=oranges&type0[]=Subject&bool0[]=AND
        are also supported by the endpoint.'
      parameters:
      - name: lookfor
        in: query
        description: Search terms. May be a single term, multiple words or a complex query containing boolean operators (AND,
          OR, NOT), quotes etc. Terms may also be prefixed with a field name (e.g. author:smith) to target only that field
          (see also type parameter).
        required: false
        schema:
          type: string
      - name: type
        in: query
        description: 'Search type. The following search types are available:

          - AllFields

          - Title

          - JournalTitle

          - NewspaperTitle

          - Author

          - Subject

          - CallNumber

          - ISN

          - Publisher

          - oclc_num

          - Series

          - Genre'
        required: false
        schema:
          type: string
          default: AllFields
      - name: field[]
        in: query
        description: 'Fields to return. If not specified, a set of default fields is returned.


          The default fields are:

          - authors

          - formats

          - id

          - uuid

          - languages

          - series

          - subjects

          - title

          - urls'
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: filter[]
        in: query
        description: 'Filter queries. Repeat for every filter.

          The format for a filter is field:value.


          ''AND'' filtering is used by default. ''OR'' or ''NOT'' filtering can be used by prepending the field with ''~''
          (OR) or ''-'' (NOT).'
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: facet[]
        in: query
        description: 'Fields to facet on. Repeat for every field. '
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: facetFilter[]
        in: query
        description: 'Faceting result filters. Contains regular expressions that the facet must match for it to be returned.
          The result will include the matched facet items and for hierarchical facets any ancestor values.

          Format for a facet filter is field:regexp, e.g. `author_facet:Sm.*th`.


          **N.B.**The filtered facet needs to be present in the list of returned facets (facet[] parameter).'
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: sort
        in: query
        description: Sort method.
        schema:
          type: string
          enum:
          - relevance
          - year
          - year asc
          - first_indexed
          - callnumber-sort
          - author
          - author desc
          - title
          - title desc
          default: relevance
      - name: page
        in: query
        description: Record page (first page is 1).
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Records to return per page. Set to 0 to return no records.
        schema:
          type: integer
          minimum: 0
          maximum: 100
          default: 20
      - name: resumptionToken
        in: query
        description: 'A large result set can only be downloaded in batches. You can initiate a batch download by setting resumptionToken
          to a single asterisk `*`. Each batch will then return a resumptionToken value to use for the next batch until no
          more results are available (note that the last result set can be empty). Other parameters are ignored when resumptionToken
          is set to any other value than `*`. The following parameters are not available with resumptionToken: limit, page,
          facet[].'
        schema:
          type: string
      - name: prettyPrint
        in: query
        description: Whether to pretty-print the response. Useful for observing the results in a browser.
        schema:
          type: boolean
          default: false
      - name: lng
        in: query
        description: Language for returned translated strings.
        schema:
          type: string
          enum:
          - en
          default: en
      - name: callback
        in: query
        description: A callback that can be used for JSONP.
        schema:
          type: string
      tags:
      - Search
      responses:
        '200':
          description: Response containing result count, records and/or facets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
